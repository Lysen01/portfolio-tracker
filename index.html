<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Office Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#0B1120] min-h-screen">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo, useRef } from 'https://esm.sh/react@18';
    import { createRoot } from 'https://esm.sh/react-dom@18/client';
    import {
      DollarSign, Home, Briefcase, Wallet, TrendingUp, Plus, Trash2, LayoutDashboard,
      ListTodo, ArrowRightLeft, Building, ChevronDown, ChevronRight, Check, X,
      Banknote, Landmark, PiggyBank, Coins, CreditCard, Car, RefreshCw, Activity, Pencil, LogIn, LogOut
    } from 'https://esm.sh/lucide-react@0.344.0';

    const ICON_MAP = {
      Home, Briefcase, Wallet, TrendingUp, DollarSign, Building, Landmark, PiggyBank, Coins, CreditCard, Car
    };

    const getIcon = (name) => ICON_MAP[name] || DollarSign;

    const renderChange = (val) => {
      if (!val) return null;
      const isPos = val >= 0;
      return (
        <span className={`text-[10px] ml-0.5 px-1 rounded-sm bg-slate-900/50 ${isPos ? 'text-emerald-400' : 'text-red-400'}`}>
          {isPos ? '▲' : '▼'}{Math.abs(val).toFixed(2)}%
        </span>
      );
    };

    const COLOR_THEMES = {
      blue: { color: 'text-blue-400', bg: 'bg-blue-500', name: '🔵 Синій' },
      emerald: { color: 'text-emerald-400', bg: 'bg-emerald-500', name: '🟢 Смарагдовий' },
      amber: { color: 'text-amber-400', bg: 'bg-amber-500', name: '🟠 Помаранчевий' },
      yellow: { color: 'text-yellow-400', bg: 'bg-yellow-500', name: '🟡 Жовтий' },
      purple: { color: 'text-purple-400', bg: 'bg-purple-500', name: '🟣 Фіолетовий' },
      pink: { color: 'text-pink-400', bg: 'bg-pink-500', name: '🌸 Рожевий' },
      cyan: { color: 'text-cyan-400', bg: 'bg-cyan-500', name: '🩵 Блакитний' }
    };

    const loadState = (key, defaultValue) => {
      try {
        const saved = localStorage.getItem(key);
        if (saved) {
          const parsed = JSON.parse(saved);
          if (Array.isArray(defaultValue) && !Array.isArray(parsed)) return defaultValue;
          if (
            defaultValue &&
            typeof defaultValue === 'object' &&
            !Array.isArray(defaultValue) &&
            (!parsed || typeof parsed !== 'object' || Array.isArray(parsed))
          ) {
            return defaultValue;
          }
          return parsed;
        }
      } catch (e) {
        console.error('Помилка читання localStorage:', e);
      }
      return defaultValue;
    };

    const FIREBASE_CONFIG = {
      apiKey: 'AIzaSyC-bPEu2Q4mXpWW2hKEYhppsK0gUiURcJ4',
      authDomain: 'flutter-ai-playground-54454.firebaseapp.com',
      projectId: 'flutter-ai-playground-54454',
      storageBucket: 'flutter-ai-playground-54454.firebasestorage.app',
      messagingSenderId: '941488460482',
      appId: '1:941488460482:web:adf3d965a1c128d125215b'
    };
    const firebaseConfigured = Boolean(
      FIREBASE_CONFIG.apiKey &&
      FIREBASE_CONFIG.authDomain &&
      FIREBASE_CONFIG.projectId &&
      FIREBASE_CONFIG.appId
    );

    function App() {
      const [exchangeRate, setExchangeRate] = useState(() => loadState('family_exchangeRate', 40));
      const [activeTab, setActiveTab] = useState('portfolio');

      const [marketData, setMarketData] = useState(() => loadState('family_marketData', { BTC: 0, ETH: 0, SOL: 0 }));
      const [marketChanges, setMarketChanges] = useState(() => loadState('family_marketChanges', { BTC: 0, ETH: 0, SOL: 0 }));
      const [isFetching, setIsFetching] = useState(false);
      const [lastSync, setLastSync] = useState(null);

      const [assetCategories, setAssetCategories] = useState(() => loadState('family_categories', {
        real_estate: { label: 'Нерухомість', iconName: 'Home', color: 'text-blue-400', bg: 'bg-blue-500' },
        business: { label: 'Бізнес та Обладнання', iconName: 'Briefcase', color: 'text-amber-400', bg: 'bg-amber-500' },
        cash: { label: 'Оборотні кошти (Кеш)', iconName: 'Coins', color: 'text-yellow-400', bg: 'bg-yellow-500' },
        crypto: { label: 'Криптовалюта та DeFi', iconName: 'Wallet', color: 'text-purple-400', bg: 'bg-purple-500' },
        bonds: { label: 'Цінні папери та Резерви', iconName: 'TrendingUp', color: 'text-emerald-400', bg: 'bg-emerald-500' },
        precious_metals: { label: 'Цінні метали', iconName: 'Coins', color: 'text-orange-400', bg: 'bg-orange-500' },
        other: { label: 'Інше', iconName: 'DollarSign', color: 'text-cyan-400', bg: 'bg-cyan-500' }
      }));

      const [expandedGroups, setExpandedGroups] = useState(() => loadState('family_expandedGroups', {
        real_estate: true, business: true, cash: true, crypto: true, bonds: true, precious_metals: true, other: true
      }));

      const [assets, setAssets] = useState(() => loadState('family_assets', [
        { id: 1, name: 'Квартира під здачу (Вінниця)', purchasePrice: 40000, value: 45000, currency: 'USD', type: 'real_estate', date: '2024-02-15', status: 'active' },
        { id: 2, name: 'Офіс ТОВ (Київ)', purchasePrice: 45000, value: 45000, currency: 'USD', type: 'real_estate', date: '2023-11-01', status: 'active' },
        { id: 3, name: 'Бурове обладнання', purchasePrice: 15000, value: 15000, currency: 'USD', type: 'business', date: '2023-05-20', status: 'active' },
        { id: 4, name: 'Оборотні кошти ТОВ (Рахунки)', purchasePrice: 10000, value: 10000, currency: 'USD', type: 'cash', date: '2024-04-01', status: 'active' },
        { id: 5, name: 'Bitcoin', ticker: 'BTC', quantity: 0.15, purchasePrice: 6000, value: 10000, currency: 'USD', type: 'crypto', date: '2023-01-15', status: 'active' },
        { id: 6, name: 'Ethereum', ticker: 'ETH', quantity: 1.5, purchasePrice: 3000, value: 5000, currency: 'USD', type: 'crypto', date: '2024-01-10', status: 'active' },
        { id: 7, name: 'Військові ОВДП (Долар)', purchasePrice: 15000, value: 15000, currency: 'USD', type: 'bonds', date: '2023-08-24', status: 'active' },
      ]));

      const [debts, setDebts] = useState(() => loadState('family_debts', [
        { id: 1, name: 'Розтермінування за Офіс', totalAmount: 45000, currency: 'USD', payments: [] },
      ]));

      const [incomes, setIncomes] = useState(() => loadState('family_incomes', [
        { id: 1, assetId: 2, amount: 33000, currency: 'UAH', date: '2024-05-01' },
        { id: 2, assetId: 1, amount: 15000, currency: 'UAH', date: '2024-05-05' },
      ]));

      const [newAsset, setNewAsset] = useState({ name: 'Bitcoin', ticker: 'BTC', quantity: '', purchasePrice: '', value: '', type: 'crypto', currency: 'USD', date: '' });
      const [newDebt, setNewDebt] = useState({ name: '', totalAmount: '', currency: 'USD' });
      const [newIncome, setNewIncome] = useState({ assetId: '', amount: '', currency: 'UAH', date: '' });
      const [newCategory, setNewCategory] = useState({ label: '', iconName: 'DollarSign', colorTheme: 'blue' });
      const [modelTargets, setModelTargets] = useState(() => loadState('family_modelTargets', [
        { id: 1, type: 'crypto', pct: 55 },
        { id: 2, type: 'real_estate', pct: 45 }
      ]));
      const [newModelTargetType, setNewModelTargetType] = useState('crypto');
      const [realizedPnlResetBase, setRealizedPnlResetBase] = useState(() => loadState('family_realizedPnlResetBase', 0));
      const [chartRange, setChartRange] = useState('all');

      const [sellingAsset, setSellingAsset] = useState(null);
      const [editingAsset, setEditingAsset] = useState(null);
      const [paymentInputs, setPaymentInputs] = useState({});
      const getTodayIso = () => new Date().toISOString().split('T')[0];
      const [currentUser, setCurrentUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(firebaseConfigured);
      const [isCloudSyncing, setIsCloudSyncing] = useState(false);
      const [firebaseReady, setFirebaseReady] = useState(false);
      const [firebaseInitError, setFirebaseInitError] = useState('');
      const isApplyingCloudRef = useRef(false);
      const firebaseCtxRef = useRef(null);

      useEffect(() => { localStorage.setItem('family_exchangeRate', JSON.stringify(exchangeRate)); }, [exchangeRate]);
      useEffect(() => { localStorage.setItem('family_categories', JSON.stringify(assetCategories)); }, [assetCategories]);
      useEffect(() => { localStorage.setItem('family_expandedGroups', JSON.stringify(expandedGroups)); }, [expandedGroups]);
      useEffect(() => { localStorage.setItem('family_assets', JSON.stringify(assets)); }, [assets]);
      useEffect(() => { localStorage.setItem('family_debts', JSON.stringify(debts)); }, [debts]);
      useEffect(() => { localStorage.setItem('family_incomes', JSON.stringify(incomes)); }, [incomes]);
      useEffect(() => { localStorage.setItem('family_marketData', JSON.stringify(marketData)); }, [marketData]);
      useEffect(() => { localStorage.setItem('family_marketChanges', JSON.stringify(marketChanges)); }, [marketChanges]);
      useEffect(() => { localStorage.setItem('family_modelTargets', JSON.stringify(modelTargets)); }, [modelTargets]);
      useEffect(() => { localStorage.setItem('family_realizedPnlResetBase', JSON.stringify(realizedPnlResetBase)); }, [realizedPnlResetBase]);
      useEffect(() => {
        setAssets(prev => {
          let changed = false;
          const fallbackDate = getTodayIso();
          const next = prev.map(asset => {
            if (!asset.date) {
              changed = true;
              return { ...asset, date: fallbackDate };
            }
            return asset;
          });
          return changed ? next : prev;
        });
      }, []);

      useEffect(() => {
        if (!firebaseConfigured) {
          setAuthLoading(false);
          return;
        }
        let cancelled = false;
        const initFirebase = async () => {
          try {
            const [{ initializeApp }, authMod, dbMod] = await Promise.all([
              import('https://esm.sh/firebase@10.12.5/app'),
              import('https://esm.sh/firebase@10.12.5/auth'),
              import('https://esm.sh/firebase@10.12.5/firestore')
            ]);
            if (cancelled) return;
            const app = initializeApp(FIREBASE_CONFIG);
            const auth = authMod.getAuth(app);
            const db = dbMod.getFirestore(app);
            const provider = new authMod.GoogleAuthProvider();
            firebaseCtxRef.current = { app, auth, db, authMod, dbMod, provider };
            setFirebaseReady(true);
            setFirebaseInitError('');
          } catch (err) {
            console.error('Помилка ініціалізації Firebase:', err);
            if (!cancelled) setFirebaseInitError('Не вдалося ініціалізувати Firebase');
          } finally {
            if (!cancelled) setAuthLoading(false);
          }
        };
        initFirebase();
        return () => { cancelled = true; };
      }, []);

      const applyCloudPayload = (payload) => {
        if (!payload) return;
        isApplyingCloudRef.current = true;
        if (payload.exchangeRate !== undefined) setExchangeRate(payload.exchangeRate);
        if (payload.assetCategories) setAssetCategories(payload.assetCategories);
        if (payload.expandedGroups) setExpandedGroups(payload.expandedGroups);
        if (payload.assets) setAssets(payload.assets);
        if (payload.debts) setDebts(payload.debts);
        if (payload.incomes) setIncomes(payload.incomes);
        if (payload.modelTargets) setModelTargets(payload.modelTargets);
        if (payload.realizedPnlResetBase !== undefined) setRealizedPnlResetBase(payload.realizedPnlResetBase);
        setTimeout(() => { isApplyingCloudRef.current = false; }, 0);
      };

      const loadCloudPortfolio = async (user) => {
        const ctx = firebaseCtxRef.current;
        if (!firebaseReady || !ctx || !user?.uid) return;
        setIsCloudSyncing(true);
        try {
          const ref = ctx.dbMod.doc(ctx.db, 'portfolios', user.uid);
          const snap = await ctx.dbMod.getDoc(ref);
          if (snap.exists()) applyCloudPayload(snap.data());
          else {
            await ctx.dbMod.setDoc(ref, {
              exchangeRate, assetCategories, expandedGroups, assets, debts, incomes, modelTargets, realizedPnlResetBase,
              updatedAt: ctx.dbMod.serverTimestamp()
            }, { merge: true });
          }
        } catch (err) {
          console.error('Помилка завантаження з хмари:', err);
        } finally {
          setIsCloudSyncing(false);
        }
      };

      const signInWithGoogle = async () => {
        const ctx = firebaseCtxRef.current;
        if (!firebaseReady || !ctx) {
          alert('Google вхід ще не налаштований. Потрібно заповнити Firebase config.');
          return;
        }
        try {
          await ctx.authMod.signInWithPopup(ctx.auth, ctx.provider);
        } catch (err) {
          console.error('Помилка Google входу:', err);
          alert('Не вдалося виконати вхід через Google');
        }
      };

      const handleSignOut = async () => {
        const ctx = firebaseCtxRef.current;
        if (!ctx) return;
        try {
          await ctx.authMod.signOut(ctx.auth);
        } catch (err) {
          console.error('Помилка виходу:', err);
        }
      };

      useEffect(() => {
        const ctx = firebaseCtxRef.current;
        if (!firebaseReady || !ctx) return;
        const unsub = ctx.authMod.onAuthStateChanged(ctx.auth, async (user) => {
          setCurrentUser(user || null);
          if (user) await loadCloudPortfolio(user);
        });
        return () => unsub();
      }, [firebaseReady]);

      useEffect(() => {
        const ctx = firebaseCtxRef.current;
        if (!firebaseReady || !ctx || !currentUser?.uid) return;
        if (isApplyingCloudRef.current) return;
        const save = async () => {
          try {
            await ctx.dbMod.setDoc(ctx.dbMod.doc(ctx.db, 'portfolios', currentUser.uid), {
              exchangeRate, assetCategories, expandedGroups, assets, debts, incomes, modelTargets, realizedPnlResetBase,
              updatedAt: ctx.dbMod.serverTimestamp()
            }, { merge: true });
          } catch (err) {
            console.error('Помилка збереження в хмару:', err);
          }
        };
        const t = setTimeout(save, 450);
        return () => clearTimeout(t);
      }, [firebaseReady, currentUser, exchangeRate, assetCategories, expandedGroups, assets, debts, incomes, modelTargets, realizedPnlResetBase]);

      // Якщо старий localStorage не має категорії "Інше", додаємо її автоматично.
      useEffect(() => {
        if (!assetCategories.other) {
          setAssetCategories(prev => ({
            ...prev,
            other: { label: 'Інше', iconName: 'DollarSign', color: 'text-cyan-400', bg: 'bg-cyan-500' }
          }));
        }
        if (!assetCategories.precious_metals) {
          setAssetCategories(prev => ({
            ...prev,
            precious_metals: { label: 'Цінні метали', iconName: 'Coins', color: 'text-orange-400', bg: 'bg-orange-500' }
          }));
        }
        if (expandedGroups.other === undefined) {
          setExpandedGroups(prev => ({ ...prev, other: true }));
        }
        if (expandedGroups.precious_metals === undefined) {
          setExpandedGroups(prev => ({ ...prev, precious_metals: true }));
        }
      }, [assetCategories, expandedGroups]);

      const fetchMarketData = async () => {
        setIsFetching(true);
        try {
          const nbuRes = await fetch('https://bank.gov.ua/NBUStatService/v1/statdirectory/exchange?valcode=USD&json');
          const nbuData = await nbuRes.json();
          if (nbuData && nbuData[0]) setExchangeRate(nbuData[0].rate);

          const assetTickers = assets.filter(a => a.type === 'crypto' && a.ticker).map(a => a.ticker);
          const uniqueTickers = [...new Set(['BTC', 'ETH', 'SOL', ...assetTickers])].join(',');

          const ccRes = await fetch(`https://min-api.cryptocompare.com/data/pricemultifull?fsyms=${uniqueTickers}&tsyms=USD`);
          const ccData = await ccRes.json();

          if (ccData && ccData.RAW) {
            setMarketData(prev => {
              const newPrices = { ...prev };
              Object.keys(ccData.RAW).forEach(ticker => {
                newPrices[ticker] = ccData.RAW[ticker].USD.PRICE;
              });
              return newPrices;
            });

            setMarketChanges(prev => {
              const newChanges = { ...prev };
              Object.keys(ccData.RAW).forEach(ticker => {
                newChanges[ticker] = ccData.RAW[ticker].USD.CHANGEPCT24HOUR;
              });
              return newChanges;
            });
          }
          setLastSync(new Date());
        } catch (error) {
          console.error('Помилка синхронізації ринкових даних:', error);
        } finally {
          setIsFetching(false);
        }
      };

      useEffect(() => {
        fetchMarketData();
        const interval = setInterval(fetchMarketData, 5 * 60 * 1000);
        return () => clearInterval(interval);
      }, [assets.length]);

      const getAssetCurrentValue = (asset) => {
        if (asset.status === 'sold') return asset.value;
        if (asset.type === 'crypto' && asset.ticker && asset.quantity) {
          if (marketData[asset.ticker]) return Number(asset.quantity) * marketData[asset.ticker];
          return Number(asset.purchasePrice);
        }
        return Number(asset.value);
      };

      const getUsdValue = (amount, currency) => currency === 'USD' ? Number(amount) : Number(amount) / exchangeRate;
      const getRemainingDebt = (debt) => Number(debt.totalAmount) - (debt.payments || []).reduce((sum, p) => sum + Number(p.amount), 0);

      const activeAssets = assets.filter(a => a.status !== 'sold');
      const soldAssets = assets.filter(a => a.status === 'sold');
      const totalAssetsUsd = activeAssets.reduce((sum, asset) => sum + getUsdValue(getAssetCurrentValue(asset), asset.currency), 0);
      const totalInvestedUsd = activeAssets.reduce((sum, asset) => sum + getUsdValue(asset.purchasePrice, asset.currency), 0);
      const totalDebtUsd = debts.reduce((sum, debt) => sum + getUsdValue(getRemainingDebt(debt), debt.currency), 0);
      const netWorthUsd = totalAssetsUsd - totalDebtUsd;
      const monthlyIncomeUsd = incomes.reduce((sum, inc) => sum + getUsdValue(inc.amount, inc.currency), 0);
      const openPnLUsd = totalAssetsUsd - totalInvestedUsd;
      const rawRealizedPnLUsd = soldAssets.reduce((sum, a) => sum + (getUsdValue(getAssetCurrentValue(a), a.currency) - getUsdValue(a.purchasePrice, a.currency)), 0);
      const realizedPnLUsd = rawRealizedPnLUsd - Number(realizedPnlResetBase || 0);
      const cryptoUsd = activeAssets.filter(a => a.type === 'crypto').reduce((sum, a) => sum + getUsdValue(getAssetCurrentValue(a), a.currency), 0);
      const realEstateUsd = activeAssets.filter(a => a.type === 'real_estate').reduce((sum, a) => sum + getUsdValue(getAssetCurrentValue(a), a.currency), 0);
      const otherUsd = Math.max(totalAssetsUsd - cryptoUsd - realEstateUsd, 0);
      const cryptoTotalPct = totalAssetsUsd > 0 ? (cryptoUsd / totalAssetsUsd) * 100 : 0;
      const realEstateTotalPct = totalAssetsUsd > 0 ? (realEstateUsd / totalAssetsUsd) * 100 : 0;
      const otherTotalPct = Math.max(100 - cryptoTotalPct - realEstateTotalPct, 0);
      const HOLDING_PALETTE = ['#60a5fa', '#818cf8', '#f472b6', '#facc15', '#22d3ee', '#cbd5e1'];
      const holdingsByType = Object.entries(assetCategories).map(([typeKey, typeInfo]) => ({
        key: typeKey,
        label: typeInfo.label,
        usd: activeAssets
          .filter(a => a.type === typeKey)
          .reduce((sum, a) => sum + getUsdValue(getAssetCurrentValue(a), a.currency), 0)
      })).filter(item => item.usd > 0).sort((a, b) => b.usd - a.usd);
      const primaryHoldings = holdingsByType.slice(0, 5).map((item, idx) => ({
        ...item,
        color: HOLDING_PALETTE[idx]
      }));
      const remainingUsd = holdingsByType.slice(5).reduce((sum, item) => sum + item.usd, 0);
      const holdingsSegments = remainingUsd > 0
        ? [...primaryHoldings, { key: 'other_holdings', label: 'Інші активи', usd: remainingUsd, color: HOLDING_PALETTE[5] }]
        : primaryHoldings;
      const holdingsSegmentsWithPct = holdingsSegments.map(item => ({
        ...item,
        pct: totalAssetsUsd > 0 ? (item.usd / totalAssetsUsd) * 100 : 0
      }));
      const primaryHolding = holdingsSegmentsWithPct[0] || { label: 'Немає активів', usd: 0, pct: 0, color: '#94a3b8' };
      let holdingsCursor = 0;
      const holdingsGradientStops = holdingsSegmentsWithPct.map((item) => {
        const start = holdingsCursor;
        holdingsCursor += item.pct;
        return `${item.color} ${start.toFixed(2)}% ${holdingsCursor.toFixed(2)}%`;
      });
      const holdingsDonutStyle = {
        background: holdingsGradientStops.length > 0 ? `conic-gradient(${holdingsGradientStops.join(', ')})` : 'conic-gradient(#334155 0% 100%)'
      };
      const holdingsUsdByType = holdingsByType.reduce((acc, item) => ({ ...acc, [item.key]: item.usd }), {});
      const modelTargetsTotalPct = modelTargets.reduce((sum, target) => sum + (Number(target.pct) || 0), 0);
      const modelRebalanceRows = modelTargets
        .filter(target => assetCategories[target.type])
        .map(target => {
          const targetPct = Number(target.pct) || 0;
          const currentUsd = holdingsUsdByType[target.type] || 0;
          const targetUsd = totalAssetsUsd * (targetPct / 100);
          return {
            ...target,
            label: assetCategories[target.type].label,
            currentUsd,
            targetUsd,
            deltaUsd: targetUsd - currentUsd
          };
        });

      const getAssetGeneratedIncomeUsd = (assetId) => incomes.filter(inc => inc.assetId === assetId).reduce((sum, inc) => sum + getUsdValue(inc.amount, inc.currency), 0);
      const formatUsd = (val) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(val);
      const formatUah = (val) => new Intl.NumberFormat('uk-UA', { style: 'currency', currency: 'UAH', maximumFractionDigits: 2 }).format(val);
      const formatDate = (dateStr) => {
        if (!dateStr) return '—';
        try { return new Intl.DateTimeFormat('uk-UA', { day: '2-digit', month: 'short', year: 'numeric' }).format(new Date(dateStr)); }
        catch { return dateStr; }
      };

      const toggleGroup = (type) => setExpandedGroups(prev => ({ ...prev, [type]: !prev[type] }));
      const handleCategoryChange = (e) => {
        const type = e.target.value;
        if (type === 'crypto') setNewAsset({ ...newAsset, type, name: 'Bitcoin', ticker: 'BTC', quantity: '', value: '' });
        else setNewAsset({ ...newAsset, type, name: '', ticker: '', quantity: '', value: '' });
      };

      const handleAddCategory = (e) => {
        e.preventDefault();
        if (!newCategory.label.trim()) return;
        const key = 'custom_' + Date.now();
        const colorProps = COLOR_THEMES[newCategory.colorTheme];
        setAssetCategories(prev => ({ ...prev, [key]: { label: newCategory.label, iconName: newCategory.iconName, color: colorProps.color, bg: colorProps.bg } }));
        setExpandedGroups(prev => ({ ...prev, [key]: true }));
        setNewCategory({ label: '', iconName: 'DollarSign', colorTheme: 'blue' });
      };

      const addAsset = (e) => {
        e.preventDefault();
        const isCrypto = newAsset.type === 'crypto';
        if (!newAsset.date) {
          alert('Дата купівлі обовʼязкова');
          return;
        }
        if (newAsset.purchasePrice === '') return;
        if (isCrypto && (newAsset.quantity === '' || !newAsset.ticker)) return;
        if (!isCrypto && newAsset.value === '') return;

        const finalName = newAsset.name || (newAsset.ticker ? `Крипто ${newAsset.ticker}` : 'Новий актив');
        setAssets(prev => [...prev, {
          ...newAsset, name: finalName, id: Date.now(),
          purchasePrice: Number(newAsset.purchasePrice),
          value: isCrypto ? 0 : Number(newAsset.value),
          quantity: isCrypto ? Number(newAsset.quantity) : undefined,
          ticker: isCrypto ? newAsset.ticker.toUpperCase() : undefined,
          status: 'active'
        }]);
        setExpandedGroups(prev => ({ ...prev, [newAsset.type]: true }));
        if (isCrypto) setNewAsset({ name: 'Bitcoin', ticker: 'BTC', quantity: '', purchasePrice: '', value: '', type: 'crypto', currency: 'USD', date: '' });
        else setNewAsset({ name: '', ticker: '', quantity: '', purchasePrice: '', value: '', type: newAsset.type, currency: 'USD', date: '' });
      };

      const confirmSell = (id) => {
        if (!sellingAsset || sellingAsset.sellPrice === '') return;
        if (!sellingAsset.sellDate) {
          alert('Дата продажу обовʼязкова');
          return;
        }
        setAssets(prev => prev.map(a => a.id === id ? { ...a, status: 'sold', value: Number(sellingAsset.sellPrice), sellDate: sellingAsset.sellDate } : a));
        setSellingAsset(null);
      };

      const startEditAsset = (asset) => {
        setSellingAsset(null);
        setEditingAsset({
          ...asset,
          name: asset.name || '',
          ticker: asset.ticker || '',
          quantity: asset.quantity ?? '',
          purchasePrice: asset.purchasePrice ?? '',
          value: asset.value ?? '',
          date: asset.date || '',
          currency: asset.currency || 'USD'
        });
      };

      const saveEditedAsset = (id) => {
        if (!editingAsset || !editingAsset.name?.trim()) return;
        if (!editingAsset.date) {
          alert('Дата купівлі обовʼязкова');
          return;
        }
        const isCrypto = editingAsset.type === 'crypto';
        if (editingAsset.purchasePrice === '' || Number.isNaN(Number(editingAsset.purchasePrice))) return;
        if (isCrypto && (editingAsset.quantity === '' || Number.isNaN(Number(editingAsset.quantity)) || !editingAsset.ticker?.trim())) return;
        if (!isCrypto && (editingAsset.value === '' || Number.isNaN(Number(editingAsset.value)))) return;

        const normalizedAsset = {
          ...editingAsset,
          name: editingAsset.name.trim(),
          purchasePrice: Number(editingAsset.purchasePrice),
          currency: editingAsset.currency,
          date: editingAsset.date || ''
        };

        if (isCrypto) {
          normalizedAsset.ticker = editingAsset.ticker.trim().toUpperCase();
          normalizedAsset.quantity = Number(editingAsset.quantity);
          normalizedAsset.value = 0;
        } else {
          normalizedAsset.value = Number(editingAsset.value);
          normalizedAsset.quantity = undefined;
          normalizedAsset.ticker = undefined;
        }

        setAssets(prev => prev.map(a => a.id === id ? { ...a, ...normalizedAsset } : a));
        setEditingAsset(null);
      };

      const addDebt = (e) => {
        e.preventDefault();
        if (!newDebt.name.trim() || newDebt.totalAmount === '') return;
        setDebts(prev => [...prev, { ...newDebt, id: Date.now(), totalAmount: Number(newDebt.totalAmount), payments: [] }]);
        setNewDebt({ name: '', totalAmount: '', currency: 'USD' });
      };

      const addDebtPayment = (debtId) => {
        const input = paymentInputs[debtId];
        if (!input || input.amount === '' || !input.date) return;
        setDebts(prev => prev.map(d => d.id === debtId ? { ...d, payments: [...(d.payments || []), { id: Date.now(), amount: Number(input.amount), date: input.date, description: input.description || '' }] } : d));
        setPaymentInputs(prev => ({ ...prev, [debtId]: { amount: '', date: '', description: '' } }));
      };

      const removeDebtPayment = (debtId, paymentId) => setDebts(prev => prev.map(d => d.id === debtId ? { ...d, payments: d.payments.filter(p => p.id !== paymentId) } : d));
      const addIncome = (e) => {
        e.preventDefault();
        if (!newIncome.assetId || newIncome.amount === '') return;
        if (!newIncome.date) {
          alert('Дата надходження обовʼязкова');
          return;
        }
        setIncomes(prev => [...prev, { ...newIncome, id: Date.now(), assetId: Number(newIncome.assetId), amount: Number(newIncome.amount) }]);
        setNewIncome({ assetId: '', amount: '', currency: 'UAH', date: '' });
      };

      const removeAsset = (id) => setAssets(prev => prev.filter(a => a.id !== id));
      const removeDebt = (id) => setDebts(prev => prev.filter(d => d.id !== id));
      const removeIncome = (id) => setIncomes(prev => prev.filter(i => i.id !== id));
      const resetRealizedPnL = () => setRealizedPnlResetBase(rawRealizedPnLUsd);
      const updateModelTarget = (id, patch) => setModelTargets(prev => prev.map(item => item.id === id ? { ...item, ...patch } : item));
      const removeModelTarget = (id) => setModelTargets(prev => prev.filter(item => item.id !== id));
      const addModelTarget = () => {
        if (!newModelTargetType || modelTargets.some(item => item.type === newModelTargetType)) return;
        setModelTargets(prev => [...prev, { id: Date.now(), type: newModelTargetType, pct: 0 }]);
      };

      const portfolioChart = useMemo(() => {
        const now = new Date();
        const parseDate = (value) => {
          if (!value) return null;
          const d = new Date(value);
          return Number.isNaN(d.getTime()) ? null : d;
        };
        const earliestAssetDate = assets
          .map(a => parseDate(a.date))
          .filter(Boolean)
          .sort((a, b) => a - b)[0];
        const fallbackStart = new Date(now);
        fallbackStart.setFullYear(now.getFullYear() - 1);
        const allStart = earliestAssetDate || fallbackStart;

        const rangeStart = new Date(now);
        if (chartRange === '1m') rangeStart.setMonth(rangeStart.getMonth() - 1);
        else if (chartRange === '3m') rangeStart.setMonth(rangeStart.getMonth() - 3);
        else if (chartRange === '6m') rangeStart.setMonth(rangeStart.getMonth() - 6);
        else if (chartRange === '1y') rangeStart.setFullYear(rangeStart.getFullYear() - 1);
        else rangeStart.setTime(allStart.getTime());

        const start = rangeStart > allStart ? rangeStart : allStart;
        const days = Math.max(2, Math.ceil((now - start) / (24 * 60 * 60 * 1000)));
        const step = Math.max(1, Math.floor(days / 180));
        const points = [];

        const getAssetEndValue = (asset) => {
          if (asset.status === 'sold') return getUsdValue(asset.value, asset.currency);
          return getUsdValue(getAssetCurrentValue(asset), asset.currency);
        };

        for (let day = 0; day <= days; day += step) {
          const d = new Date(start);
          d.setDate(start.getDate() + day);
          let value = 0;
          for (const asset of assets) {
            const purchaseDate = parseDate(asset.date) || start;
            const sellDate = parseDate(asset.sellDate);
            if (d < purchaseDate) continue;

            const startUsd = getUsdValue(asset.purchasePrice, asset.currency);
            const endUsd = getAssetEndValue(asset);
            if (asset.status === 'sold' && sellDate && d > sellDate) {
              // Після продажу вважаємо, що сума продажу залишається в портфелі як кеш.
              value += Math.max(0, endUsd);
              continue;
            }
            const endDate = asset.status === 'sold' && sellDate ? sellDate : now;
            const span = Math.max(1, endDate - purchaseDate);
            const progress = Math.min(1, Math.max(0, (d - purchaseDate) / span));
            const base = startUsd + (endUsd - startUsd) * progress;
            const cryptoVol = asset.type === 'crypto' ? Math.sin((day + Number(asset.id || 0)) / 8) * 0.03 : 0;
            value += Math.max(0, base * (1 + cryptoVol));
          }
          points.push({ date: d, value });
        }

        if (points.length === 0) return null;
        const values = points.map(p => p.value);
        const min = Math.min(...values);
        const max = Math.max(...values);
        const current = values[values.length - 1];
        return { points, min, max, current };
      }, [assets, chartRange, exchangeRate, marketData]);

      const formatChartDate = (date) => new Intl.DateTimeFormat('uk-UA', { day: '2-digit', month: 'short' }).format(date);

                      {currentUser.displayName || currentUser.email || 'User'}

                    <button onClick={signInWithGoogle} disabled={authLoading || !firebaseReady} className="flex items-center gap-2 text-xs text-slate-300 hover:text-white transition-colors bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700 disabled:opacity-50">
                      <LogIn size={14} />
                      {authLoading || !firebaseReady ? 'Підключення...' : 'Увійти через Google'}

                  <button disabled className="flex items-center gap-2 text-xs text-slate-500 bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700 cursor-not-allowed" title="Додай Firebase config у коді">

                  <RefreshCw size={14} className={isFetching ? 'animate-spin' : ''} />

              <button onClick={() => setActiveTab('modeling')} className={`pb-3 text-sm font-medium border-b-2 flex items-center gap-2 transition-colors whitespace-nowrap ${activeTab === 'modeling' ? 'border-violet-500 text-violet-400' : 'border-transparent text-slate-400 hover:text-slate-200'}`}><TrendingUp size={16} /> Моделювання</button>
              <button onClick={() => setActiveTab('debts')} className={`pb-3 text-sm font-medium border-b-2 flex items-center gap-2 transition-colors whitespace-nowrap ${activeTab === 'debts' ? 'border-red-500 text-red-400' : 'border-transparent text-slate-400 hover:text-slate-200'}`}><ListTodo size={16} /> Розтермінування</button>
              <button onClick={() => setActiveTab('cashflow')} className={`pb-3 text-sm font-medium border-b-2 flex items-center gap-2 transition-colors whitespace-nowrap ${activeTab === 'cashflow' ? 'border-emerald-500 text-emerald-400' : 'border-transparent text-slate-400 hover:text-slate-200'}`}><ArrowRightLeft size={16} /> Грошовий Потік</button>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-4 mt-8 space-y-8">
            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-5 gap-4">
              <div className="bg-slate-800/50 rounded-2xl p-5 border border-slate-700/50"><p className="text-sm text-slate-400 mb-1">Чистий Капітал</p><h2 className="text-2xl font-bold text-white">{formatUsd(netWorthUsd)}</h2></div>
              <div className="bg-slate-800/50 rounded-2xl p-5 border border-slate-700/50"><p className="text-sm text-slate-400 mb-1">Вкладено</p><h2 className="text-2xl font-bold text-slate-300">{formatUsd(totalInvestedUsd)}</h2></div>
              <div className="bg-slate-800/50 rounded-2xl p-5 border border-slate-700/50"><p className="text-sm text-slate-400 mb-1">Поточна Вартість</p><h2 className="text-2xl font-bold text-blue-400">{formatUsd(totalAssetsUsd)}</h2></div>
              <div className="bg-slate-800/50 rounded-2xl p-5 border border-slate-700/50">
                <p className="text-sm text-slate-400 mb-1">P&L (Відкриті позиції)</p>
                <h2 className={`text-2xl font-bold ${openPnLUsd >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>{openPnLUsd > 0 ? '+' : ''}{formatUsd(openPnLUsd)}</h2>
                {soldAssets.length > 0 && (
                  <div className="mt-1 flex items-center justify-between gap-2">

            </div>

            <div className="bg-slate-900/60 border border-slate-800 rounded-xl px-4 py-2 text-xs text-slate-400 flex items-center justify-between">
              <span>
                {firebaseConfigured
                  ? currentUser
                    ? `Хмарний профіль: ${currentUser.email || currentUser.displayName || 'Google User'}`
                    : firebaseInitError ? firebaseInitError : 'Гість: дані зберігаються локально у цьому браузері'
                  : 'Google вхід вимкнено: заповни Firebase config у файлі index.html'}
              </span>
              {isCloudSyncing && <span className="text-blue-400">Синхронізація...</span>}
            </div>

            {activeTab === 'portfolio' && (
              <div className="space-y-6">
                <div className="flex justify-between items-end"><h3 className="text-xl font-bold text-white">Структура Активів (Відкриті позиції)</h3><p className="text-xs text-slate-400 flex items-center gap-1"><Activity size={12}/> Ціни крипти оновлюються автоматично</p></div>
                <div className="bg-slate-900 rounded-2xl border border-slate-800 overflow-x-auto shadow-xl">
                  <table className="w-full text-left border-collapse min-w-[980px]">
                    <thead>
                      <tr className="bg-slate-800/80 text-slate-400 text-sm border-b border-slate-800"><th className="p-4">Категорія / Актив</th><th className="p-4 whitespace-nowrap">Купівля</th><th className="p-4 whitespace-nowrap">Продаж</th><th className="p-4 text-right">Вкладено</th><th className="p-4 text-right">Поточна вартість</th><th className="p-4 text-right text-emerald-400">Згенеровано (Кеш)</th><th className="p-4 text-right">P&L (Динаміка)</th><th className="p-4 text-center w-24">Дії</th></tr>
                    </thead>
                    <tbody className="divide-y divide-slate-800/50">
                      {Object.entries(assetCategories).map(([typeKey, typeInfo]) => {

                        const groupInvestedUsd = groupAssets.reduce((sum, a) => sum + getUsdValue(a.purchasePrice, a.currency), 0);
                        const groupTotalUsd = groupAssets.reduce((sum, a) => sum + getUsdValue(getAssetCurrentValue(a), a.currency), 0);
                        const groupPnL = groupTotalUsd - groupInvestedUsd;
                        const groupPnLPercent = groupInvestedUsd > 0 ? (groupPnL / groupInvestedUsd) * 100 : 0;
                        const groupGeneratedUsd = groupAssets.reduce((sum, a) => sum + getAssetGeneratedIncomeUsd(a.id), 0);
                        const isExpanded = expandedGroups[typeKey];
                        const Icon = getIcon(typeInfo.iconName);

                        return (

                              <td className="p-4"><div className="flex items-center gap-3"><div className="text-slate-500">{isExpanded ? <ChevronDown size={18} /> : <ChevronRight size={18} />}</div><div className={`p-2 bg-slate-800 rounded-lg border border-slate-700 ${typeInfo.color}`}><Icon size={18} /></div><div><span className="font-bold text-slate-200 text-base">{typeInfo.label}</span><div className="text-xs text-slate-500">{groupAssets.length} позицій</div></div></div></td>
                              <td className="p-4 text-slate-600">—</td>
                              <td className="p-4 text-slate-600">—</td>
                              <td className="p-4 text-right font-medium text-slate-300">{formatUsd(groupInvestedUsd)}</td>
                              <td className="p-4 text-right font-bold text-white text-lg">{formatUsd(groupTotalUsd)}</td>
                              <td className="p-4 text-right font-bold text-emerald-400">{groupGeneratedUsd > 0 ? `+${formatUsd(groupGeneratedUsd)}` : '—'}</td>
                              <td className="p-4 text-right">{groupInvestedUsd > 0 && (<div className={`inline-flex flex-col items-end ${groupPnL >= 0 ? 'text-emerald-400' : 'text-red-400'}`}><span className="font-bold">{groupPnL > 0 ? '+' : ''}{formatUsd(groupPnL)}</span><span className="text-xs">{groupPnLPercent.toFixed(1)}%</span></div>)}</td>
                              <td className="p-4"></td>
                            </tr>
                            {isExpanded && groupAssets.map((asset) => {
                              const investedUsd = getUsdValue(asset.purchasePrice, asset.currency);
                              const currentUsd = getUsdValue(getAssetCurrentValue(asset), asset.currency);
                              const pnl = currentUsd - investedUsd;
                              const pnlPercent = investedUsd > 0 ? (pnl / investedUsd) * 100 : 0;
                              const generatedUsd = getAssetGeneratedIncomeUsd(asset.id);
                              const isSelling = sellingAsset?.id === asset.id;
                              const isEditing = editingAsset?.id === asset.id;
                              const isAutoPriced = !!(asset.ticker && asset.quantity);

                              return (
                                <tr key={asset.id} className="bg-slate-900/30 border-l-2 border-l-slate-700/50">
                                  <td className="py-3 px-4 pl-14">
                                    {isEditing ? (
                                      <div className="flex flex-col gap-2">
                                        <div className="flex gap-2">
                                          <input type="text" value={editingAsset.name} onChange={(e) => setEditingAsset({ ...editingAsset, name: e.target.value })} className="flex-1 bg-slate-900 border border-slate-600 rounded px-2 py-1 text-sm text-white focus:outline-none" placeholder="Назва активу" />
                                          {asset.type === 'crypto' && (
                                            <input type="text" value={editingAsset.ticker} onChange={(e) => setEditingAsset({ ...editingAsset, ticker: e.target.value.toUpperCase() })} className="w-24 bg-slate-900 border border-slate-600 rounded px-2 py-1 text-sm text-white focus:outline-none" placeholder="Тікер" />
                                          )}
                                        </div>
                                        <div className="flex gap-2 items-center">
                                          <input required type="date" value={editingAsset.date || ''} onChange={(e) => setEditingAsset({ ...editingAsset, date: e.target.value })} className="w-40 bg-slate-900 border border-slate-600 rounded px-2 py-1 text-sm text-white focus:outline-none [color-scheme:dark]" />
                                          <select value={editingAsset.currency} onChange={(e) => setEditingAsset({ ...editingAsset, currency: e.target.value })} className="w-20 bg-slate-900 border border-slate-600 rounded px-2 py-1 text-sm text-white focus:outline-none">
                                            <option value="USD">USD</option>
                                            <option value="UAH">UAH</option>
                                          </select>
                                        </div>
                                      </div>
                                    ) : (
                                      <div className="flex flex-col">
                                        <div className="flex items-center gap-2">
                                          <div className={`w-1.5 h-1.5 rounded-full ${isAutoPriced ? 'bg-blue-400 animate-pulse' : 'bg-slate-600'}`}></div>
                                          <span className="text-sm font-medium text-slate-300">{asset.name} {asset.ticker && <span className="text-slate-500 text-xs ml-1 bg-slate-800 px-1.5 py-0.5 rounded">{asset.ticker}</span>}</span>
                                        </div>
                                        <div className="text-xs text-slate-500 ml-3.5 mt-1">
                                          {isAutoPriced && marketData[asset.ticker] && (<span className="text-blue-400/70 border-l border-slate-700 pl-2 ml-2">Кількість: {asset.quantity} (Курс: {formatUsd(marketData[asset.ticker])})</span>)}

                    return (
                      <div key={debt.id} className="bg-slate-900 rounded-2xl border border-slate-800 p-6 flex flex-col">
                        <div className="flex justify-between items-start mb-4"><div><h4 className="text-lg font-bold text-white">{debt.name}</h4><p className="text-sm text-slate-400">Всього: {debt.currency === 'USD' ? formatUsd(debt.totalAmount) : formatUah(debt.totalAmount)}</p></div><button onClick={() => removeDebt(debt.id)} className="text-slate-500 hover:text-red-400"><Trash2 size={16} /></button></div>
                        <div className="mb-4"><p className="text-sm text-slate-400 mb-1">Залишилось виплатити:</p><div className="text-3xl font-bold text-red-400">{debt.currency === 'USD' ? formatUsd(remainingAmount) : formatUah(remainingAmount)}</div></div>
                        <div className="space-y-2 mb-6"><div className="flex justify-between text-xs font-medium"><span className="text-emerald-400">Виплачено: {progress.toFixed(1)}%</span><span className="text-slate-400">Залишилось: {(100 - progress).toFixed(1)}%</span></div><div className="w-full h-3 bg-slate-800 rounded-full overflow-hidden"><div className="h-full bg-emerald-500" style={{ width: `${progress}%` }}></div></div></div>
                        <div className="pt-4 border-t border-slate-700/50 mt-auto"><h5 className="text-sm font-bold text-slate-300 mb-3 flex items-center justify-between"><span>Історія платежів</span><span className="bg-slate-800 text-slate-400 py-0.5 px-2 rounded-full text-xs">{(debt.payments || []).length}</span></h5><div className="space-y-2 mb-4 max-h-40 overflow-y-auto">{(debt.payments || []).map(p => (<div key={p.id} className="flex items-center justify-between bg-slate-800/50 p-2 rounded-lg text-sm"><div className="flex flex-col"><span className="text-slate-400 text-xs">{formatDate(p.date)}</span>{p.description && <span className="text-slate-300 text-xs">{p.description}</span>}</div><div className="flex items-center gap-3"><span className="text-emerald-400 font-bold">+{p.amount} {debt.currency}</span><button onClick={() => removeDebtPayment(debt.id, p.id)} className="text-slate-500 hover:text-red-400"><X size={14} /></button></div></div>))}</div><div className="flex flex-col gap-2"><div className="flex gap-2"><input type="number" step="any" placeholder="Сума" value={currentInput.amount} onChange={(e) => setPaymentInputs({...paymentInputs, [debt.id]: { ...currentInput, amount: e.target.value }})} className="w-1/3 bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-sm text-white focus:outline-none" /><input required type="date" value={currentInput.date} onChange={(e) => setPaymentInputs({...paymentInputs, [debt.id]: { ...currentInput, date: e.target.value }})} className="flex-1 bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-sm text-white focus:outline-none [color-scheme:dark]" /></div><div className="flex gap-2"><input type="text" placeholder="Опис" value={currentInput.description || ''} onChange={(e) => setPaymentInputs({...paymentInputs, [debt.id]: { ...currentInput, description: e.target.value }})} className="flex-1 bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-sm text-white focus:outline-none" /><button onClick={() => addDebtPayment(debt.id)} className="bg-emerald-600 text-white px-3 py-1.5 rounded text-sm font-bold"><Plus size={16} /></button></div></div></div>
                      </div>
                    );
                  })}
                  <div className="bg-slate-800/30 border border-dashed border-slate-600 rounded-2xl p-6 flex flex-col justify-center"><h4 className="text-white font-medium mb-4 flex items-center gap-2"><Plus size={18} className="text-slate-400"/> Нове розтермінування</h4><form onSubmit={addDebt} className="space-y-4"><div><label className="block text-xs text-slate-400 mb-1">Назва</label><input required type="text" value={newDebt.name} onChange={e => setNewDebt({...newDebt, name: e.target.value})} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none" /></div><div className="flex gap-2"><div className="flex-1"><label className="block text-xs text-slate-400 mb-1">Сума</label><input required type="number" step="any" value={newDebt.totalAmount} onChange={e => setNewDebt({...newDebt, totalAmount: e.target.value})} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none" /></div><div className="w-24"><label className="block text-xs text-slate-400 mb-1">Валюта</label><select value={newDebt.currency} onChange={e => setNewDebt({...newDebt, currency: e.target.value})} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"><option value="USD">USD</option><option value="UAH">UAH</option></select></div></div><button type="submit" className="w-full bg-slate-700 hover:bg-slate-600 text-white py-2.5 rounded-lg text-sm font-bold">Створити запис</button></form></div>
                </div>
              </div>
            )}

            {activeTab === 'cashflow' && (
              <div className="space-y-6">
                <h3 className="text-xl font-bold text-white">Регулярні Надходження</h3>
                <div className="bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden shadow-xl"><div className="p-6 border-b border-slate-800 bg-emerald-500/10"><p className="text-emerald-400 font-medium">Загальний пасивний дохід: <span className="text-2xl font-bold ml-2">{formatUsd(monthlyIncomeUsd)} / міс</span></p></div><div className="divide-y divide-slate-800/50">{incomes.map((income) => { const linkedAsset = assets.find(a => a.id === income.assetId); return (<div key={income.id} className="p-4 flex items-center justify-between"><div className="flex items-center gap-3"><div className="p-2 bg-emerald-500/20 text-emerald-400 rounded-full"><ArrowRightLeft size={16} /></div><div><span className="font-medium text-slate-200">{linkedAsset ? linkedAsset.name : 'Невідомо'}</span>{income.date && <div className="text-xs text-slate-500">Отримано: {formatDate(income.date)}</div>}</div></div><div className="flex items-center gap-4"><span className="font-bold text-emerald-400">+{income.currency === 'USD' ? formatUsd(income.amount) : formatUah(income.amount)}</span><button onClick={() => removeIncome(income.id)} className="text-slate-500 hover:text-red-400"><Trash2 size={16} /></button></div></div>);})}</div><div className="bg-slate-800/20 p-4 border-t border-slate-800"><form onSubmit={addIncome} className="flex flex-wrap gap-3 items-end"><div className="flex-1 min-w-[200px]"><label className="block text-xs text-slate-400 mb-1">Джерело</label><select required value={newIncome.assetId} onChange={e => setNewIncome({...newIncome, assetId: e.target.value})} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none"><option value="" disabled>Оберіть актив...</option>{assets.map(a => (<option key={a.id} value={a.id}>{a.name}</option>))}</select></div><div className="w-36"><label className="block text-xs text-slate-400 mb-1">Дата</label><input required type="date" value={newIncome.date} onChange={e => setNewIncome({...newIncome, date: e.target.value})} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white [color-scheme:dark]" /></div><div className="w-32"><label className="block text-xs text-slate-400 mb-1">Сума</label><input required type="number" step="any" value={newIncome.amount} onChange={e => setNewIncome({...newIncome, amount: e.target.value})} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white" /></div><div className="w-24"><label className="block text-xs text-slate-400 mb-1">Валюта</label><select value={newIncome.currency} onChange={e => setNewIncome({...newIncome, currency: e.target.value})} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white"><option value="UAH">UAH</option><option value="USD">USD</option></select></div><button type="submit" className="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 h-[38px]"><Plus size={16} /> Додати</button></form></div></div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
